<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面对比工具 - 移动端预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0c0d12;
            --surface: #151821;
            --surface2: #1e2230;
            --border: #2a2f42;
            --text: #e8eaf3;
            --text-dim: #6b7194;
            --accent: #7c6cf0;
            --accent2: #b4adff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: nowrap;
            min-height: 44px;
        }

        .logo {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c6cf0, #b4adff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .nav-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: .3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .counter {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            min-width: 55px;
            text-align: center;
        }

        .counter .cur {
            color: var(--accent2);
            font-size: 15px;
        }

        .spacer {
            flex: 1;
        }

        .kbd-hints {
            display: flex;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        kbd {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0 4px;
            font-family: inherit;
            font-size: 10px;
        }

        /* ===== URL BAR ===== */
        .url-bar {
            display: flex;
            align-items: center;
            padding: 5px 16px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
            font-size: 11px;
            overflow: hidden;
        }

        .url-item {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            flex: 1;
        }

        .url-label {
            flex-shrink: 0;
            font-weight: 700;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .url-label.src {
            background: rgba(124, 108, 240, .2);
            color: var(--accent2);
        }

        .url-label.dst {
            background: rgba(0, 200, 150, .15);
            color: #5af0c8;
        }

        .url-item a {
            color: var(--text-dim);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .url-item a:hover {
            color: var(--text);
            text-decoration: underline;
        }

        .time-stamp {
            flex-shrink: 0;
            color: var(--text-dim);
            font-size: 10px;
        }

        .note-badge {
            color: #fdcb6e;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* ===== PHONE FRAMES ===== */
        .compare-area {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 24px;
            padding: 16px;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(124, 108, 240, .05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(90, 240, 200, .03) 0%, transparent 50%);
        }

        .phone-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 0 1 390px;
            min-width: 0;
            max-width: 390px;
        }

        .phone-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 3px 14px;
            border-radius: 16px;
            flex-shrink: 0;
        }

        .phone-title.src {
            background: rgba(124, 108, 240, .2);
            color: var(--accent2);
        }

        .phone-title.dst {
            background: rgba(90, 240, 200, .15);
            color: #5af0c8;
        }

        .phone-frame {
            flex: 1;
            width: 100%;
            background: #000;
            border-radius: 32px;
            border: 3px solid #333;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .04),
                0 16px 48px rgba(0, 0, 0, .45),
                0 0 30px rgba(124, 108, 240, .06);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .phone-notch {
            width: 110px;
            height: 22px;
            background: #000;
            border-radius: 0 0 14px 14px;
            margin: 0 auto;
            flex-shrink: 0;
        }

        .phone-frame iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
            min-height: 0;
        }

        .phone-home {
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-shrink: 0;
        }

        .phone-home-bar {
            width: 90px;
            height: 4px;
            background: #444;
            border-radius: 2px;
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            padding: 40px;
            background:
                radial-gradient(ellipse at 50% 50%, rgba(124, 108, 240, .06) 0%, transparent 60%);
        }

        .welcome.hidden {
            display: none;
        }

        .welcome-icon {
            font-size: 56px;
            opacity: .7;
        }

        .welcome-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c6cf0, #b4adff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-desc {
            color: var(--text-dim);
            font-size: 13px;
            text-align: center;
            line-height: 1.7;
            max-width: 400px;
        }

        .welcome-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 16px rgba(124, 108, 240, .35);
        }

        .welcome-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(124, 108, 240, .5);
        }

        /* ===== SIDEBAR ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: right .3s ease;
        }

        .sidebar.open {
            right: 0;
        }

        .sb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sb-header h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .sb-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        .sb-close:hover {
            color: var(--text);
        }

        /* Import section in sidebar */
        .sb-import {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sb-import-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .sb-import-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 0;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .sb-import-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .sb-import-btn.danger {
            border-color: rgba(255, 100, 100, .3);
            color: #ff8080;
        }

        .sb-import-btn.danger:hover {
            background: #c0392b;
            border-color: #c0392b;
            color: #fff;
        }

        .sb-import-hint {
            font-size: 10px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .sb-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .sb-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background .15s;
            border: 1px solid transparent;
        }

        .sb-item:hover {
            background: var(--surface2);
        }

        .sb-item.active {
            background: rgba(124, 108, 240, .12);
            border-color: var(--accent);
        }

        .sb-idx {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .sb-urls {
            font-size: 10px;
            color: var(--text);
            word-break: break-all;
            line-height: 1.5;
        }

        .sb-arrow {
            color: var(--accent2);
            margin: 0 3px;
        }

        .sb-note {
            margin-top: 2px;
            font-size: 10px;
            color: #fdcb6e;
        }

        .sb-empty {
            padding: 30px 16px;
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            line-height: 1.8;
        }

        .sb-empty-icon {
            font-size: 28px;
            margin-bottom: 8px;
            opacity: .5;
        }

        .fab {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 80;
            background: var(--accent);
            color: #fff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(124, 108, 240, .45);
            transition: transform .2s;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        /* ===== Import Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 22px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 16px 18px;
            flex: 1;
            overflow-y: auto;
        }

        .modal-body label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .modal-body textarea {
            width: 100%;
            height: 260px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            padding: 10px;
            resize: vertical;
            line-height: 1.6;
        }

        .modal-body textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-body textarea::placeholder {
            color: var(--text-dim);
            opacity: .6;
        }

        .modal-hint {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 8px;
            line-height: 1.6;
        }

        .modal-hint code {
            background: var(--surface2);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
        }

        .modal-footer .btn-primary {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 7px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
        }

        .modal-footer .btn-primary:hover {
            background: #6a5bd4;
        }

        .modal-footer .btn-primary:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">📱 页面对比</div>
        <div class="nav-group" id="navGroup" style="display:none">
            <button class="btn" id="prevBtn" onclick="go(-1)">◀ 上一组</button>
            <div class="counter"><span class="cur" id="curNum">0</span> / <span id="totalNum">0</span></div>
            <button class="btn" id="nextBtn" onclick="go(1)">下一组 ▶</button>
        </div>
        <div class="spacer"></div>
        <div class="kbd-hints" id="kbdHints" style="display:none">
            <span><kbd>←</kbd> <kbd>→</kbd> 切换</span>
            <span><kbd>L</kbd> 列表</span>
        </div>
        <button class="btn" onclick="toggleSidebar()">☰ 菜单</button>
    </div>

    <!-- URL Bar (hidden until data loaded) -->
    <div class="url-bar" id="urlBar" style="display:none">
        <div class="url-item">
            <span class="url-label src">源站</span>
            <a id="srcLink" href="#" target="_blank"></a>
        </div>
        <div class="url-item">
            <span class="url-label dst">复刻</span>
            <a id="dstLink" href="#" target="_blank"></a>
        </div>
        <span class="note-badge" id="noteText"></span>
        <span class="time-stamp" id="timeTag"></span>
    </div>

    <!-- Welcome Screen (shown when no data) -->
    <div class="welcome" id="welcome">
        <div class="welcome-icon">📱</div>
        <div class="welcome-title">页面对比工具</div>
        <div class="welcome-desc">
            左右并排预览源站与复刻站的移动端效果<br>
            点击下方按钮或右上角 ☰ 菜单导入数据
        </div>
        <button class="welcome-btn" onclick="openImportModal()">📂 导入数据</button>
    </div>

    <!-- Phone Frames (hidden until data loaded) -->
    <div class="compare-area" id="compareArea" style="display:none">
        <div class="phone-wrapper">
            <div class="phone-title src">源站</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="srcFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
        <div class="phone-wrapper">
            <div class="phone-title dst">复刻</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="dstFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sb-header">
            <h3>☰ 菜单</h3>
            <button class="sb-close" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sb-import">
            <div class="sb-import-row">
                <button class="sb-import-btn" onclick="openImportModal()">📋 粘贴导入</button>
                <button class="sb-import-btn" onclick="triggerFileImport()">📂 文件导入</button>
                <button class="sb-import-btn danger" id="clearBtn" onclick="clearData()" style="display:none">🗑
                    清空</button>
            </div>
            <div class="sb-import-hint">支持格式：<code>[时间] 源站URL | 复刻URL</code></div>
        </div>
        <div class="sb-list" id="sbList">
            <div class="sb-empty" id="sbEmpty">
                <div class="sb-empty-icon">📭</div>
                暂无数据<br>请通过上方按钮导入
            </div>
        </div>
    </div>
    <button class="fab" onclick="toggleSidebar()">☰</button>

    <!-- Import Modal -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📋 粘贴导入数据</h3>
                <button class="modal-close" onclick="closeImportModal()">✕</button>
            </div>
            <div class="modal-body">
                <label>将对比数据粘贴到下方：</label>
                <textarea id="importTextarea" placeholder="https://example.com/page1 | https://your-site.com/page1
https://example.com/page2 | https://your-site.com/page2"></textarea>
                <div class="modal-hint">
                    每行一组，两个URL用 <code>|</code> 或 <code>-</code> 分隔
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeImportModal()">取消</button>
                <button class="btn-primary" onclick="doImport()">导入</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".md,.txt,.csv" onchange="handleFileImport(event)">

    <script>
        let data = [];
        let idx = 0;
        const STORAGE_KEY = 'split-check-data';

        function parseLine(line) {
            line = line.trim();
            if (!line) return null;

            // 尝试提取时间戳 [xxx]
            let time = '';
            const tm = line.match(/^\[(.+?)\]\s*/);
            if (tm) {
                time = tm[1];
                line = line.slice(tm[0].length);
            }

            // 用 | 或 - 分隔两个URL（优先匹配 |）
            let parts = null;
            // 尝试 " | " 分隔
            if (line.includes(' | ')) {
                parts = line.split(' | ');
            }
            // 尝试 " - " 分隔（确保不是URL内部的-）
            else if (line.match(/https?:\/\/\S+\s+-\s+https?:\/\//)) {
                const m = line.match(/^(https?:\/\/\S+)\s+-\s+(.*)/)
                if (m) parts = [m[1], m[2]];
            }

            if (!parts || parts.length < 2) return null;

            let src = parts[0].trim();
            let dstRaw = parts.slice(1).join(' | ').trim();
            let dst = dstRaw, note = '';

            // 提取复刻URL后面的中文备注
            const m = dstRaw.match(/^(https?:\/\/\S+)\s*([\u4e00-\u9fff].+)?$/);
            if (m) { dst = m[1]; note = m[2] || ''; }
            else if (!dstRaw.startsWith('http')) { dst = ''; }

            if (!src.startsWith('http')) return null;

            return { time, src, dst, note };
        }

        function parseText(text) {
            return text.split(/\r?\n/).filter(l => l.trim()).map(parseLine).filter(Boolean);
        }

        // ---- Storage ----
        function saveToStorage() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { }
        }

        function loadFromStorage() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        data = parsed;
                        idx = 0;
                        activateUI();
                        renderSidebar();
                        render();
                    }
                }
            } catch (e) { }
        }

        function proxyUrl(u) {
            return '/proxy?url=' + encodeURIComponent(u);
        }

        // ---- Import ----
        function openImportModal() {
            document.getElementById('importModal').classList.add('open');
            document.getElementById('importTextarea').focus();
            // Close sidebar if open
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('open');
        }

        function doImport() {
            const text = document.getElementById('importTextarea').value.trim();
            if (!text) return;
            const parsed = parseText(text);
            if (parsed.length === 0) {
                alert('未解析到有效数据，请检查格式');
                return;
            }
            data = parsed;
            idx = 0;
            closeImportModal();
            saveToStorage();
            activateUI();
            renderSidebar();
            render();
        }

        function triggerFileImport() {
            document.getElementById('fileInput').click();
        }

        function handleFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                const text = ev.target.result;
                const parsed = parseText(text);
                if (parsed.length === 0) {
                    alert('未解析到有效数据，请检查文件格式');
                    return;
                }
                data = parsed;
                idx = 0;
                saveToStorage();
                activateUI();
                renderSidebar();
                render();
                // Close sidebar
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('open');
            };
            reader.readAsText(file, 'utf-8');
            // Reset so same file can be re-imported
            e.target.value = '';
        }

        function clearData() {
            if (!confirm('确定要清空当前数据吗？')) return;
            data = [];
            idx = 0;
            localStorage.removeItem(STORAGE_KEY);
            deactivateUI();
            renderSidebar();
        }

        // ---- UI State ----
        function activateUI() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('compareArea').style.display = 'flex';
            document.getElementById('urlBar').style.display = 'flex';
            document.getElementById('navGroup').style.display = 'flex';
            document.getElementById('kbdHints').style.display = 'flex';
            document.getElementById('clearBtn').style.display = '';
            document.getElementById('sbEmpty').style.display = 'none';
        }

        function deactivateUI() {
            document.getElementById('welcome').classList.remove('hidden');
            document.getElementById('compareArea').style.display = 'none';
            document.getElementById('urlBar').style.display = 'none';
            document.getElementById('navGroup').style.display = 'none';
            document.getElementById('kbdHints').style.display = 'none';
            document.getElementById('clearBtn').style.display = 'none';
            document.getElementById('sbEmpty').style.display = '';
            document.getElementById('srcFrame').src = 'about:blank';
            document.getElementById('dstFrame').src = 'about:blank';
        }

        // ---- Navigation ----
        function go(dir) {
            const n = idx + dir;
            if (n < 0 || n >= data.length) return;
            idx = n;
            render();
            highlightSb();
        }

        function jumpTo(i) {
            idx = i;
            render();
            highlightSb();
        }

        function render() {
            const d = data[idx];
            if (!d) return;

            document.getElementById('curNum').textContent = idx + 1;
            document.getElementById('totalNum').textContent = data.length;

            document.getElementById('srcLink').textContent = d.src;
            document.getElementById('srcLink').href = d.src;
            document.getElementById('dstLink').textContent = d.dst || '-';
            document.getElementById('dstLink').href = d.dst || '#';
            document.getElementById('timeTag').textContent = d.time;
            document.getElementById('noteText').textContent = d.note ? '💬 ' + d.note : '';

            document.getElementById('srcFrame').src = d.src.startsWith('http') ? proxyUrl(d.src) : 'about:blank';
            document.getElementById('dstFrame').src = (d.dst && d.dst.startsWith('http')) ? d.dst : 'about:blank';

            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= data.length - 1;
        }

        // ---- Sidebar ----
        function renderSidebar() {
            const list = document.getElementById('sbList');
            const emptyEl = document.getElementById('sbEmpty');
            // Remove all items except sbEmpty
            list.querySelectorAll('.sb-item').forEach(el => el.remove());

            if (data.length === 0) {
                emptyEl.style.display = '';
                return;
            }
            emptyEl.style.display = 'none';

            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'sb-item' + (i === idx ? ' active' : '');
                div.onclick = () => jumpTo(i);
                const noteHtml = item.note ? `<div class="sb-note">💬 ${item.note}</div>` : '';
                div.innerHTML = `<div class="sb-idx">#${i + 1} · ${item.time}</div><div class="sb-urls">${item.src} <span class="sb-arrow">→</span> ${item.dst || '-'}</div>${noteHtml}`;
                list.appendChild(div);
            });
        }

        function highlightSb() {
            document.querySelectorAll('.sb-item').forEach((el, i) => el.classList.toggle('active', i === idx));
            const a = document.querySelector('.sb-item.active');
            if (a) a.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        // ---- Keyboard ----
        document.addEventListener('keydown', e => {
            // Don't capture when typing in textarea
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') { go(-1); e.preventDefault(); }
            if (e.key === 'ArrowRight') { go(1); e.preventDefault(); }
            if (e.key === 'l' || e.key === 'L') { toggleSidebar(); e.preventDefault(); }
        });

        // Restore the last imported list after a refresh.
        loadFromStorage();
    </script>
</body>

</html>
