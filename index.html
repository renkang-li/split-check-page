<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面对比工具 - 移动端预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">📱 页面对比</div>
        <div class="nav-group" id="navGroup" style="display:none">
            <button class="btn" id="prevBtn" onclick="go(-1)">◀ 上一组</button>
            <div class="counter"><span class="cur" id="curNum">0</span> / <span id="totalNum">0</span></div>
            <button class="btn" id="nextBtn" onclick="go(1)">下一组 ▶</button>
        </div>
        <div class="preview-switch" aria-label="预览模式切换">
            <button class="btn preview-btn active" id="mobileModeBtn" onclick="setPreviewMode('mobile')">移动端</button>
            <button class="btn preview-btn" id="desktopModeBtn" onclick="setPreviewMode('desktop')">PC端</button>
        </div>
        <div class="spacer"></div>
        <div class="kbd-hints" id="kbdHints" style="display:none">
            <span><kbd>←</kbd> <kbd>→</kbd> 切换</span>
            <span><kbd>L</kbd> 列表</span>
        </div>
        <button class="btn" onclick="toggleSidebar()">☰ 菜单</button>
    </div>

    <!-- URL Bar (hidden until data loaded) -->
    <div class="url-bar" id="urlBar" style="display:none">
        <div class="url-item">
            <span class="url-label src">源站</span>
            <a id="srcLink" href="#" target="_blank"></a>
        </div>
        <div class="url-item">
            <span class="url-label dst">复刻</span>
            <a id="dstLink" href="#" target="_blank"></a>
        </div>
        <span class="note-badge" id="noteText"></span>
        <span class="time-stamp" id="timeTag"></span>
    </div>

    <!-- Welcome Screen (shown when no data) -->
    <div class="welcome" id="welcome">
        <div class="welcome-icon">📱</div>
        <div class="welcome-title">页面对比工具</div>
        <div class="welcome-desc">
            左右并排预览源站与复刻站的移动端效果<br>
            点击下方按钮或右上角 ☰ 菜单导入数据
        </div>
        <button class="welcome-btn" onclick="openImportModal()">📂 导入数据</button>
    </div>

    <!-- Phone Frames (hidden until data loaded) -->
    <div class="compare-area" id="compareArea" style="display:none">
        <div class="phone-wrapper">
            <div class="phone-title src">源站</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="srcFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
        <div class="phone-wrapper">
            <div class="phone-title dst">复刻</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="dstFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sb-header">
            <h3>☰ 菜单</h3>
            <button class="sb-close" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sb-import">
            <div class="sb-import-row">
                <button class="sb-import-btn" onclick="openImportModal()">📋 粘贴导入</button>
                <button class="sb-import-btn" onclick="triggerFileImport()">📂 文件导入</button>
                <button class="sb-import-btn danger" id="clearBtn" onclick="clearData()" style="display:none">🗑
                    清空</button>
            </div>
            <div class="sb-import-hint">支持格式：<code>[时间] 源站URL | 复刻URL</code></div>
        </div>
        <div class="sb-list" id="sbList">
            <div class="sb-empty" id="sbEmpty">
                <div class="sb-empty-icon">📭</div>
                暂无数据<br>请通过上方按钮导入
            </div>
        </div>
    </div>
    <button class="fab" onclick="toggleSidebar()">☰</button>

    <!-- Import Modal -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📋 粘贴导入数据</h3>
                <button class="modal-close" onclick="closeImportModal()">✕</button>
            </div>
            <div class="modal-body">
                <label>将对比数据粘贴到下方：</label>
                <textarea id="importTextarea" placeholder="源站URL | 复刻站URL
https://example.com/page1 | https://your-site.com/page1
https://example.com/page2 | https://your-site.com/page2"></textarea>
                <div class="modal-hint">
                    每行一组，格式：<code>源站URL</code> <code>|</code> <code>复刻站URL</code>（用 <code>|</code> 或 <code>-</code> 分隔）<br>
                    ⚠️ 注意顺序：左边为<strong>源站</strong>（原站），右边为<strong>复刻站</strong>，不可颠倒（源站有转发机制）
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeImportModal()">取消</button>
                <button class="btn-primary" onclick="doImport()">导入</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".md,.txt,.csv" onchange="handleFileImport(event)">
    <script src="app.js"></script>
</body>

</html>
