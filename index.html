<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面对比工具 - 移动端预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0c0d12;
            --surface: #151821;
            --surface2: #1e2230;
            --border: #2a2f42;
            --text: #e8eaf3;
            --text-dim: #6b7194;
            --accent: #7c6cf0;
            --accent2: #b4adff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: nowrap;
            min-height: 44px;
        }

        .logo {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #7c6cf0, #b4adff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .nav-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: .3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .counter {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            min-width: 55px;
            text-align: center;
        }

        .counter .cur {
            color: var(--accent2);
            font-size: 15px;
        }

        .spacer {
            flex: 1;
        }

        .kbd-hints {
            display: flex;
            gap: 8px;
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        kbd {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0 4px;
            font-family: inherit;
            font-size: 10px;
        }

        /* ===== URL BAR ===== */
        .url-bar {
            display: flex;
            align-items: center;
            padding: 5px 16px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 12px;
            font-size: 11px;
            overflow: hidden;
        }

        .url-item {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
            flex: 1;
        }

        .url-label {
            flex-shrink: 0;
            font-weight: 700;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .url-label.src {
            background: rgba(124, 108, 240, .2);
            color: var(--accent2);
        }

        .url-label.dst {
            background: rgba(0, 200, 150, .15);
            color: #5af0c8;
        }

        .url-item a {
            color: var(--text-dim);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .url-item a:hover {
            color: var(--text);
            text-decoration: underline;
        }

        .time-stamp {
            flex-shrink: 0;
            color: var(--text-dim);
            font-size: 10px;
        }

        .note-badge {
            color: #fdcb6e;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* ===== PHONE FRAMES ===== */
        .compare-area {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 24px;
            padding: 16px 16px;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(124, 108, 240, .05) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(90, 240, 200, .03) 0%, transparent 50%);
        }

        .phone-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 0 1 390px;
            min-width: 0;
            max-width: 390px;
        }

        .phone-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 3px 14px;
            border-radius: 16px;
            flex-shrink: 0;
        }

        .phone-title.src {
            background: rgba(124, 108, 240, .2);
            color: var(--accent2);
        }

        .phone-title.dst {
            background: rgba(90, 240, 200, .15);
            color: #5af0c8;
        }

        .phone-frame {
            flex: 1;
            width: 100%;
            background: #000;
            border-radius: 32px;
            border: 3px solid #333;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .04),
                0 16px 48px rgba(0, 0, 0, .45),
                0 0 30px rgba(124, 108, 240, .06);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .phone-notch {
            width: 110px;
            height: 22px;
            background: #000;
            border-radius: 0 0 14px 14px;
            margin: 0 auto;
            flex-shrink: 0;
        }

        .phone-frame iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
            min-height: 0;
        }

        .phone-home {
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-shrink: 0;
        }

        .phone-home-bar {
            width: 90px;
            height: 4px;
            background: #444;
            border-radius: 2px;
        }

        /* ===== SIDEBAR ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -380px;
            width: 380px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: right .3s ease;
        }

        .sidebar.open {
            right: 0;
        }

        .sb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sb-header h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .sb-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        .sb-close:hover {
            color: var(--text);
        }

        .sb-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .sb-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background .15s;
            border: 1px solid transparent;
        }

        .sb-item:hover {
            background: var(--surface2);
        }

        .sb-item.active {
            background: rgba(124, 108, 240, .12);
            border-color: var(--accent);
        }

        .sb-idx {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .sb-urls {
            font-size: 10px;
            color: var(--text);
            word-break: break-all;
            line-height: 1.5;
        }

        .sb-arrow {
            color: var(--accent2);
            margin: 0 3px;
        }

        .sb-note {
            margin-top: 2px;
            font-size: 10px;
            color: #fdcb6e;
        }

        .fab {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 80;
            background: var(--accent);
            color: #fff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(124, 108, 240, .45);
            transition: transform .2s;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        /* ===== Loading ===== */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">加载数据中...</div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="logo">📱 页面对比</div>
        <div class="nav-group">
            <button class="btn" id="prevBtn" onclick="go(-1)">◀ 上一组</button>
            <div class="counter"><span class="cur" id="curNum">0</span> / <span id="totalNum">0</span></div>
            <button class="btn" id="nextBtn" onclick="go(1)">下一组 ▶</button>
        </div>
        <div class="spacer"></div>
        <div class="kbd-hints">
            <span><kbd>←</kbd> <kbd>→</kbd> 切换</span>
            <span><kbd>L</kbd> 列表</span>
        </div>
        <button class="btn" onclick="toggleSidebar()">☰ 列表</button>
    </div>

    <!-- URL Bar -->
    <div class="url-bar">
        <div class="url-item">
            <span class="url-label src">源站</span>
            <a id="srcLink" href="#" target="_blank"></a>
        </div>
        <div class="url-item">
            <span class="url-label dst">复刻</span>
            <a id="dstLink" href="#" target="_blank"></a>
        </div>
        <span class="note-badge" id="noteText"></span>
        <span class="time-stamp" id="timeTag"></span>
    </div>

    <!-- Phone Frames -->
    <div class="compare-area">
        <div class="phone-wrapper">
            <div class="phone-title src">源站</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="srcFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
        <div class="phone-wrapper">
            <div class="phone-title dst">复刻</div>
            <div class="phone-frame">
                <div class="phone-notch"></div>
                <iframe id="dstFrame"></iframe>
                <div class="phone-home">
                    <div class="phone-home-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sb-header">
            <h3>📋 全部对比项</h3>
            <button class="sb-close" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sb-list" id="sbList"></div>
    </div>
    <button class="fab" onclick="toggleSidebar()">☰</button>

    <script>
        let data = [];
        let idx = 0;

        async function loadData() {
            try {
                const resp = await fetch('/result.md?t=' + Date.now());
                const text = await resp.text();
                data = text.split(/\r?\n/).filter(l => l.trim()).map(parseLine).filter(Boolean);
                document.getElementById('loading').classList.add('hidden');
                renderSidebar();
                render();
            } catch (e) {
                document.querySelector('.loading-text').textContent = '加载失败: ' + e.message;
            }
        }

        function parseLine(line) {
            const tm = line.match(/^\[(.+?)\]/);
            const time = tm ? tm[1] : '';
            const rest = line.slice(line.indexOf(']') + 2);
            const pi = rest.indexOf(' | ');
            if (pi === -1) return null;

            let src = rest.slice(0, pi).trim();
            let dstRaw = rest.slice(pi + 3).trim();
            let dst = dstRaw, note = '';

            const m = dstRaw.match(/^(https?:\/\/\S+)\s*([\u4e00-\u9fff].+)?$/);
            if (m) { dst = m[1]; note = m[2] || ''; }
            else if (!dstRaw.startsWith('http')) { dst = ''; }

            return { time, src, dst, note };
        }

        function proxyUrl(u) {
            return '/proxy?url=' + encodeURIComponent(u);
        }

        function go(dir) {
            const n = idx + dir;
            if (n < 0 || n >= data.length) return;
            idx = n;
            render();
            highlightSb();
        }

        function jumpTo(i) {
            idx = i;
            render();
            highlightSb();
        }

        function render() {
            const d = data[idx];
            if (!d) return;

            document.getElementById('curNum').textContent = idx + 1;
            document.getElementById('totalNum').textContent = data.length;

            document.getElementById('srcLink').textContent = d.src;
            document.getElementById('srcLink').href = d.src;
            document.getElementById('dstLink').textContent = d.dst || '-';
            document.getElementById('dstLink').href = d.dst || '#';
            document.getElementById('timeTag').textContent = d.time;
            document.getElementById('noteText').textContent = d.note ? '💬 ' + d.note : '';

            document.getElementById('srcFrame').src = d.src.startsWith('http') ? proxyUrl(d.src) : 'about:blank';
            document.getElementById('dstFrame').src = (d.dst && d.dst.startsWith('http')) ? d.dst : 'about:blank';

            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= data.length - 1;
        }

        function renderSidebar() {
            const list = document.getElementById('sbList');
            list.innerHTML = '';
            data.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'sb-item' + (i === idx ? ' active' : '');
                div.onclick = () => jumpTo(i);
                const noteHtml = item.note ? `<div class="sb-note">💬 ${item.note}</div>` : '';
                div.innerHTML = `<div class="sb-idx">#${i + 1} · ${item.time}</div><div class="sb-urls">${item.src} <span class="sb-arrow">→</span> ${item.dst || '-'}</div>${noteHtml}`;
                list.appendChild(div);
            });
        }

        function highlightSb() {
            document.querySelectorAll('.sb-item').forEach((el, i) => el.classList.toggle('active', i === idx));
            const a = document.querySelector('.sb-item.active');
            if (a) a.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') { go(-1); e.preventDefault(); }
            if (e.key === 'ArrowRight') { go(1); e.preventDefault(); }
            if (e.key === 'l' || e.key === 'L') { toggleSidebar(); e.preventDefault(); }
        });

        loadData();
    </script>
</body>

</html>
